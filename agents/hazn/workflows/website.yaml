# Full Website Build Workflow
# Triggered by: /hazn-website
# For NGO/association/political/institutional sites, use /hazn-ngo instead.

name: website
description: Complete B2B/commercial marketing website from strategy to deployment
trigger: /hazn-website

# IMPORTANT: Ask the user what type of organisation this is before proceeding.
# - B2B / commercial / agency → this workflow (b2b-marketing-ux skill)
# - NGO / association / political org / international institution → /hazn-ngo (ngo-web-design skill)
# - E-commerce → ecommerce skills
# Never default to B2B framing for an NGO. The goals, IA, tone, and compliance requirements are fundamentally different.

phases:
  - id: type-check
    name: Organisation Type
    agent: strategist
    required: true
    note: |
      Ask: "What type of organisation is this website for?"
      B2B/commercial → continue this workflow.
      NGO/association/political/institutional → redirect to /hazn-ngo.

  - id: strategy
    name: Strategy & Positioning
    agent: strategist
    command: /hazn-strategy
    outputs:
      - .hazn/outputs/strategy.md
    required: true

  - id: ux
    name: UX Architecture
    agent: ux-architect
    command: /hazn-ux
    depends_on: [strategy]
    outputs:
      - .hazn/outputs/ux-blueprint.md
    required: true

  - id: copy
    name: Conversion Copy
    agent: copywriter
    command: /hazn-copy
    depends_on: [strategy, ux]
    outputs:
      - .hazn/outputs/copy/
    required: false
    note: Can be done in parallel with wireframes

  - id: wireframe
    name: Wireframe Validation
    agent: wireframer
    command: /hazn-wireframe
    depends_on: [ux]
    outputs:
      - .hazn/outputs/wireframes/
    required: false
    note: Optional but recommended for stakeholder sign-off

  - id: dev
    name: Development
    agent: developer
    command: /hazn-dev
    depends_on: [ux]
    optional_inputs: [copy, wireframe]
    outputs:
      - src/
      - app/
    required: true

  - id: seo
    name: SEO Optimization
    agent: seo-specialist
    command: /hazn-seo
    depends_on: [dev]
    outputs:
      - .hazn/outputs/seo-checklist.md
    required: true

  - id: content
    name: Blog Content
    agent: content-writer
    command: /hazn-content
    depends_on: [strategy, seo]
    outputs:
      - content/blog/
    required: false
    note: Post-launch content pipeline

checkpoints:
  - after: strategy
    message: "Strategy complete. Review .hazn/outputs/strategy.md before proceeding."
  
  - after: wireframe
    message: "Wireframes ready. Get stakeholder approval before development."
  
  - after: dev
    message: "Core build complete. Review in browser before SEO optimization."

estimated_duration:
  quick: "2-3 days (skip wireframes, minimal copy)"
  standard: "1-2 weeks (full process)"
  thorough: "3-4 weeks (extensive copy, multiple revisions)"

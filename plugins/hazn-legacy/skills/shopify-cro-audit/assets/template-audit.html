<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{STORE_NAME}} CRO Audit | Autonomous Technologies</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Pathway+Extreme:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a12;
            --bg-secondary: #12121a;
            --bg-card: rgba(255, 255, 255, 0.03);
            --border-subtle: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-muted: rgba(255, 255, 255, 0.5);
            --accent-cyan: #00d5ff;
            --accent-purple: #a855f7;
            --accent-pink: #ec4899;
            --accent-green: #00d564;
            --accent-yellow: #fbbf24;
            --accent-red: #ff3c3c;
            --gradient-primary: linear-gradient(135deg, #00d5ff 0%, #a855f7 50%, #ec4899 100%);
            --gradient-text: linear-gradient(90deg, #00d5ff, #a855f7, #ec4899);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Pathway Extreme', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.7;
            font-size: 16px;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            line-height: 1.2;
        }

        /* Header */
        .brand-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 16px 40px;
            background: rgba(10, 10, 18, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand-header .logo { height: 36px; width: auto; }

        .brand-header .brand-name {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 14px;
            letter-spacing: 0.3em;
            color: var(--text-primary);
        }

        /* Cover Section */
        .cover {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 120px 40px 80px;
            background: radial-gradient(ellipse at center top, rgba(0, 213, 255, 0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at center bottom, rgba(168, 85, 247, 0.08) 0%, transparent 50%),
                        var(--bg-primary);
            position: relative;
            overflow: hidden;
        }

        .cover::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(0, 213, 255, 0.03) 0%, transparent 70%);
            pointer-events: none;
        }

        .cover .logo-main { width: 180px; margin-bottom: 32px; }

        .cover .audit-label {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--accent-cyan);
            margin-bottom: 16px;
        }

        .cover h1 {
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 800;
            margin-bottom: 24px;
            background: var(--gradient-text);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .cover .store-url {
            font-size: 1.25rem;
            color: var(--text-secondary);
            margin-bottom: 48px;
        }

        .cover .score-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        /* Score ring - adjust conic-gradient based on score: score * 3.6 = degrees */
        .cover .cro-score {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: conic-gradient(var(--accent-cyan) 0deg, var(--accent-purple) calc({{SCORE}} * 1.8deg), var(--accent-pink) calc({{SCORE}} * 3.6deg), rgba(255,255,255,0.1) calc({{SCORE}} * 3.6deg));
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .cover .cro-score::before {
            content: '';
            position: absolute;
            inset: 8px;
            background: var(--bg-primary);
            border-radius: 50%;
        }

        .cover .score-value {
            position: relative;
            font-family: 'Outfit', sans-serif;
            font-size: 4rem;
            font-weight: 800;
            background: var(--gradient-text);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .cover .score-label {
            font-size: 14px;
            color: var(--text-muted);
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        .positioning {
            margin-top: 64px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .positioning-line {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .audit-date {
            margin-top: 32px;
            font-size: 14px;
            color: var(--text-muted);
        }

        /* Main Content */
        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 80px 40px;
        }

        section {
            margin-bottom: 120px;
            scroll-margin-top: 120px;
        }

        .section-header { margin-bottom: 48px; }

        .section-number {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--accent-cyan);
            margin-bottom: 12px;
        }

        .section-header h2 {
            font-size: 2.5rem;
            margin-bottom: 16px;
        }

        .section-header p {
            font-size: 1.125rem;
            color: var(--text-secondary);
            max-width: 700px;
        }

        /* Cards */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 24px;
            backdrop-filter: blur(20px);
        }

        /* Summary Stats */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: 48px;
        }

        .summary-stat {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 28px;
            text-align: center;
        }

        .summary-stat .label {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .summary-stat .value {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            background: var(--gradient-text);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .summary-stat .context {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .summary-stat.positive .context { color: var(--accent-green); }

        /* Priority Issues */
        .priority-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 24px;
        }

        .priority-item {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            gap: 20px;
            transition: all 0.3s ease;
        }

        .priority-item:hover {
            border-color: rgba(0, 213, 255, 0.3);
            transform: translateY(-2px);
        }

        .priority-number {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 1.25rem;
            flex-shrink: 0;
        }

        .priority-number.critical { background: var(--accent-red); color: white; }
        .priority-number.high { background: var(--accent-yellow); color: #0a0a12; }

        .priority-content h4 { font-size: 1.125rem; margin-bottom: 8px; }

        .priority-content p {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .impact-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            background: rgba(0, 213, 100, 0.15);
            color: var(--accent-green);
        }

        /* Audit Sections */
        .audit-area { margin-bottom: 64px; }

        .audit-area h3 {
            font-size: 1.5rem;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .audit-area h3::before {
            content: '';
            width: 4px;
            height: 24px;
            background: var(--gradient-primary);
            border-radius: 2px;
        }

        .score-bar {
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .score-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .score-bar-fill.excellent { background: var(--accent-green); }
        .score-bar-fill.good { background: var(--accent-cyan); }
        .score-bar-fill.needs-work { background: var(--accent-yellow); }
        .score-bar-fill.poor { background: var(--accent-red); }

        /* Issue Cards */
        .issue-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .issue-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 24px;
            display: grid;
            grid-template-columns: 48px 1fr auto;
            gap: 20px;
            align-items: start;
        }

        .issue-number {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.125rem;
            color: white;
        }

        .issue-number.critical { background: var(--accent-red); }
        .issue-number.high { background: var(--accent-yellow); color: #0a0a12; }
        .issue-number.ok { background: var(--accent-green); }

        .issue-details h4 { font-size: 1.125rem; margin-bottom: 8px; }

        .issue-details p {
            color: var(--text-secondary);
            margin-bottom: 16px;
        }

        .issue-recommendation {
            background: rgba(0, 213, 255, 0.08);
            border-left: 3px solid var(--accent-cyan);
            padding: 12px 16px;
            border-radius: 0 8px 8px 0;
            font-size: 14px;
        }

        .issue-recommendation strong { color: var(--accent-cyan); }

        .issue-meta { text-align: right; }

        .effort-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 8px;
        }

        .effort-badge.low { background: rgba(0, 213, 100, 0.15); color: var(--accent-green); }
        .effort-badge.medium { background: rgba(0, 213, 255, 0.15); color: var(--accent-cyan); }
        .effort-badge.high { background: rgba(251, 191, 36, 0.15); color: var(--accent-yellow); }

        /* Screenshots */
        .screenshot-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin: 32px 0;
        }

        .screenshot-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            overflow: hidden;
        }

        .screenshot-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-subtle);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .screenshot-card img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            object-position: top;
        }

        /* Strengths */
        .strengths-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-top: 24px;
        }

        .strength-item {
            background: rgba(0, 213, 100, 0.08);
            border: 1px solid rgba(0, 213, 100, 0.2);
            border-radius: 12px;
            padding: 16px;
        }

        .strength-item h5 {
            color: var(--accent-green);
            font-size: 0.9rem;
            margin-bottom: 4px;
        }

        .strength-item p {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* Quick Wins */
        .quickwin-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .quickwin-item {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 24px;
            display: grid;
            grid-template-columns: 56px 1fr auto;
            gap: 24px;
            align-items: center;
            transition: all 0.3s ease;
        }

        .quickwin-item:hover { border-color: rgba(0, 213, 255, 0.3); }

        .quickwin-number {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--gradient-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 1.5rem;
        }

        .quickwin-content h4 { margin-bottom: 8px; }

        .quickwin-content p {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .quickwin-impact { text-align: right; }

        .quickwin-impact .value {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--accent-green);
        }

        .quickwin-impact .label {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* Roadmap */
        .roadmap-phase { margin-bottom: 48px; }

        .phase-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }

        .phase-badge {
            padding: 8px 16px;
            border-radius: 24px;
            background: var(--gradient-primary);
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 12px;
            letter-spacing: 0.1em;
        }

        .phase-title { font-size: 1.25rem; }

        .roadmap-table {
            width: 100%;
            border-collapse: collapse;
        }

        .roadmap-table th,
        .roadmap-table td {
            padding: 16px 20px;
            text-align: left;
            border-bottom: 1px solid var(--border-subtle);
        }

        .roadmap-table th {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .roadmap-table td { color: var(--text-secondary); }

        .roadmap-table td:first-child {
            color: var(--text-primary);
            font-weight: 500;
        }

        .severity-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        .severity-badge.critical { background: rgba(255, 60, 60, 0.15); color: var(--accent-red); }
        .severity-badge.high { background: rgba(251, 191, 36, 0.15); color: var(--accent-yellow); }
        .severity-badge.medium { background: rgba(0, 213, 255, 0.15); color: var(--accent-cyan); }

        /* Footer */
        footer {
            padding: 80px 40px;
            background: var(--bg-secondary);
            text-align: center;
        }

        footer .logo { height: 48px; margin-bottom: 24px; }

        footer .brand-text {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 16px;
            letter-spacing: 0.3em;
            margin-bottom: 16px;
        }

        footer p {
            color: var(--text-muted);
            font-size: 14px;
        }

        footer a {
            color: var(--accent-cyan);
            text-decoration: none;
        }

        @media (max-width: 768px) {
            .screenshot-grid { grid-template-columns: 1fr; }
            .issue-card { grid-template-columns: 1fr; }
            .quickwin-item { grid-template-columns: 1fr; text-align: center; }
            .quickwin-number { margin: 0 auto; }
            main { padding: 40px 20px; }
        }
    </style>
</head>
<body>

<!-- Header -->
<header class="brand-header">
    <div style="display: flex; align-items: center; gap: 16px;">
        <img src="https://autonomoustech.ca/logo-transparent.png" alt="Autonomous" class="logo">
        <span class="brand-name">AUTONOMOUS</span>
    </div>
</header>

<!-- Cover -->
<section class="cover" id="cover">
    <img src="https://autonomoustech.ca/logo-transparent.png" alt="Autonomous" class="logo-main">
    <div class="audit-label">Shopify CRO Audit</div>
    <h1>{{STORE_NAME}}</h1>
    <div class="store-url">{{STORE_URL}}</div>
    
    <div class="score-container">
        <div class="cro-score">
            <span class="score-value">{{SCORE}}</span>
        </div>
        <div class="score-label">Overall CRO Score</div>
    </div>
    
    <div class="positioning">
        <span class="positioning-line">Canadian Expertise.</span>
        <span class="positioning-line">Pakistani Efficiency.</span>
        <span class="positioning-line">World-class Quality.</span>
    </div>
    
    <div class="audit-date">{{DATE}}</div>
</section>

<main>
    <!-- CONTENT SECTIONS GO HERE -->
    <!-- Use section templates from SKILL.md -->
</main>

<footer>
    <img src="https://autonomoustech.ca/logo-transparent.png" alt="Autonomous" class="logo">
    <div class="brand-text">AUTONOMOUS</div>
    <p>Prepared by Autonomous Technologies<br><a href="https://autonomoustech.ca">autonomoustech.ca</a></p>
</footer>

</body>
</html>
